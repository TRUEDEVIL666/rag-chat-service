<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản Trị Hệ Thống</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icon Library -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Font chữ Google Inter cho giống hình */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- CARD CONTAINER -->
    <div class="bg-white w-full max-w-4xl rounded-2xl shadow-xl overflow-hidden flex h-[600px]">

        <!-- CỘT TRÁI: HÌNH ẢNH (Ẩn trên mobile) -->
        <div class="hidden md:block w-1/2 relative">
            <img src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?q=80&w=2070&auto=format&fit=crop"
                alt="Office" class="absolute inset-0 w-full h-full object-cover">
            <!-- Lớp phủ màu đen nhẹ cho ảnh tối đi chút -->
            <div class="absolute inset-0 bg-black/10"></div>
        </div>

        <!-- CỘT PHẢI: FORM ĐĂNG NHẬP -->
        <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center bg-white">

            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Hệ thống sinh viên</h1>
                <p class="text-gray-500">Vui lòng đăng nhập để tiếp tục</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <!-- Email Input -->
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Email</label>
                    <input type="email" id="email" placeholder="Nhập email" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-gray-700 placeholder-gray-400">
                </div>

                <!-- Password Input -->
                <div class="relative">
                    <label class="block text-gray-700 font-medium mb-2">Mật khẩu</label>
                    <input type="password" id="password" placeholder="••••••••" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-gray-700 placeholder-gray-400">

                    <!-- Nút con mắt ẩn hiện password -->
                    <button type="button" onclick="togglePassword()"
                        class="absolute right-4 top-[42px] text-gray-400 hover:text-gray-600">
                        <i id="eye-icon" class="ph ph-eye-slash text-xl"></i>
                    </button>
                </div>

                <!-- Button Đăng nhập -->
                <button type="submit" id="btn-login"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-lg transition duration-300 shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2">
                    Đăng Nhập
                </button>
            </form>

            <div class="mt-8 text-center text-gray-600">
                Chưa có tài khoản?
                <a href="register.html" class="text-blue-600 font-bold hover:underline">Đăng ký ngay</a>
            </div>

            <!-- Khu vực báo lỗi -->
            <p id="msg-box" class="mt-4 text-center text-sm text-red-500 font-medium"></p>
        </div>
    </div>

    <!-- JAVASCRIPT XỬ LÝ -->
    <script>
        // Cấu hình đường dẫn API
        const API_BASE = "http://localhost:8000/api/v1";

        // 2. Hàm ẩn hiện pass (Giữ nguyên)
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('ph-eye-slash');
                eyeIcon.classList.add('ph-eye');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('ph-eye');
                eyeIcon.classList.add('ph-eye-slash');
            }
        }

        // 3. Xử lý Đăng Nhập
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const msgBox = document.getElementById('msg-box');

            // Lấy giá trị
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Loading
            btn.disabled = true;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Đang xử lý...';
            msgBox.innerText = "";

            try {
                // Gửi request
                const response = await fetch(`${API_BASE}/login`, { // Gọi vào /login
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // QUAN TRỌNG: Backend Python yêu cầu "email", không phải "username"
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    msgBox.className = "mt-4 text-center text-sm text-green-600 font-medium";
                    msgBox.innerText = "Đăng nhập thành công!";

                    // Lưu token (Tùy backend trả về key tên gì, thường là access_token hoặc session)
                    if (data.access_token) localStorage.setItem('token', data.access_token);

                    setTimeout(() => {
                        window.location.href = 'admin/index.html';
                    }, 1000);
                } else {
                    // Backend trả lỗi 400/404/401
                    msgBox.className = "mt-4 text-center text-sm text-red-500 font-medium";
                    msgBox.innerText = data.detail || "Đăng nhập thất bại!";
                    btn.disabled = false;
                    btn.innerText = "Đăng Nhập";
                }
            } catch (error) {
                console.error(error);
                msgBox.innerText = "Lỗi kết nối Server!";
                btn.disabled = false;
                btn.innerText = "Đăng Nhập";
            }
        });
    </script>
</body>

</html>
