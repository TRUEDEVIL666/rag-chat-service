<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - RAG Chat Service</title>

  <!-- Dependencies -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Theme Config -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/theme-config.js"></script>

  <!-- Styles -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: #f8fafc;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }

    /* Transition for page load */
    .fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Spinner */
    .animate-spin {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="flex h-screen overflow-hidden text-slate-700">

  <!-- SIDEBAR CONTAINER -->
  <div id="sidebar-container"></div>

  <!-- MAIN CONTENT LAYOUT -->
  <main
    class="flex-1 flex flex-col overflow-hidden ml-64 relative bg-[#fbfcfd] dark:bg-gray-900 transition-colors duration-200">
    <!-- TOP BAR CONTAINER -->
    <div id="topbar-container"></div>

    <!-- APP CONTENT AREA (Pages injected here) -->
    <div id="app-content" class="flex-1 flex flex-col overflow-hidden relative">
      <!-- Loading Indicator Default -->
      <div class="flex items-center justify-center h-full">
        <i class="ph ph-spinner animate-spin text-4xl text-primary-600"></i>
      </div>
    </div>
  </main>

  <!-- Global Scripts -->
  <script src="js/translations.js"></script>
  <!-- Define Router Class First -->
  <script src="js/router.js"></script>

  <!-- Main Logic -->
  <script src="js/main.js"></script>

  <script>
    // Check Auth
    const token = localStorage.getItem('token');
    if (!token) {
      // In a real app we might redirect to login, but for now we let it be or redirect
      // window.location.href = '../login.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Router is initialized in main.js or here
      // Assuming main.js handles sidebar loading and then router initialization, or vice versa
    });
  </script>
</body>

</html>
