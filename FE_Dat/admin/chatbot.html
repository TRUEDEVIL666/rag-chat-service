<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot - Quản Trị Hệ Thống</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icon Library -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        /* Custom Scrollbar */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .message-content {
            white-space: pre-wrap;
        }
    </style>
</head>

<body class="bg-gray-50 h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-white border-b h-16 flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="text-gray-500 hover:text-gray-700">
                <i class="ph ph-arrow-left text-xl"></i>
            </button>
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-xl font-bold">
                    <i class="ph-fill ph-robot"></i>
                </div>
                <div>
                    <h1 id="bot-name" class="font-bold text-gray-800 text-lg leading-tight">Đang tải...</h1>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span>
                        <p id="bot-model" class="text-xs text-gray-500">...</p>
                    </div>
                </div>
            </div>
        </div>

        <div>
            <button onclick="clearChat()" class="text-gray-400 hover:text-red-500 transition" title="Xóa đoạn chat">
                <i class="ph ph-trash text-xl"></i>
            </button>
        </div>
    </header>

    <!-- CHAT AREA -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 scroll-smooth">
        <!-- Welcome Message -->
        <div class="flex justify-start">
            <div class="bg-white border border-gray-200 rounded-2xl p-4 max-w-[80%] shadow-sm">
                <p class="text-gray-800">Xin chào! Tôi có thể giúp gì cho bạn hôm nay?</p>
            </div>
        </div>
    </main>

    <!-- INPUT AREA -->
    <div class="bg-white border-t p-4 shrink-0">
        <div class="max-w-4xl mx-auto relative">
            <form id="chat-form" class="flex items-end gap-2">
                <div
                    class="flex-1 bg-gray-100 rounded-2xl p-3 focus-within:ring-2 focus-within:ring-blue-100 transition border border-transparent focus-within:border-blue-200">
                    <textarea id="user-input" rows="1"
                        class="w-full bg-transparent border-none focus:ring-0 text-gray-700 placeholder-gray-400 resize-none max-h-32 focus:outline-none"
                        placeholder="Nhập tin nhắn..." required></textarea>
                </div>
                <button type="submit" id="send-btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-full shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="ph-fill ph-paper-plane-right text-xl"></i>
                </button>
            </form>
            <p class="text-center text-xs text-gray-400 mt-2">AI có thể mắc lỗi. Hãy kiểm chứng thông tin quan trọng.
            </p>
        </div>
    </div>

    <!-- SCRIPT -->
    <script>
        const API_BASE = "http://localhost:8000/api/v1";
        const urlParams = new URLSearchParams(window.location.search);
        const BOT_ID = urlParams.get('id');
        let SESSION_ID = ""; // Will be set by API or localStorage

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const botNameEl = document.getElementById('bot-name');
        const botModelEl = document.getElementById('bot-model');

        // Check Auth & Bot ID
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '../login.html';
        if (!BOT_ID) {
            alert("Thiếu Bot ID!");
            window.location.href = 'bots.html';
        }

        // Auto resize textarea
        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Handle Enter key (Shift+Enter for new line)
        userInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('chat-form').dispatchEvent(new Event('submit'));
            }
        });

        // 1. Fetch Bot Details
        async function fetchBotDetails() {
            try {
                const response = await fetch(`${API_BASE}/bots/${BOT_ID}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error("Bot not found");

                const bot = await response.json();
                botNameEl.innerText = bot.name;
                botModelEl.innerText = bot.config_model?.model || "AI Model";

                // document.title = `Chat với ${bot.name}`;

            } catch (error) {
                console.error(error);
                alert("Không thể tải thông tin Bot.");
                window.location.href = 'bots.html';
            }
        }

        // 2. Append Message to UI
        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            const contentClass = role === 'user'
                ? 'bg-blue-600 text-white rounded-2xl rounded-tr-sm'
                : 'bg-white border border-gray-200 text-gray-800 rounded-2xl rounded-tl-sm shadow-sm';

            div.innerHTML = `
                <div class="${contentClass} p-4 max-w-[80%] break-words message-content">${text}</div>
            `;

            chatContainer.appendChild(div);
            scrollToBottom();
            return div.querySelector('.message-content'); // Return element for streaming updates
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function clearChat() {
            if (confirm("Xóa lịch sử chat hiện tại?")) {
                chatContainer.innerHTML = '';
                SESSION_ID = ""; // Reset session
                appendMessage('system', 'Đã xóa hội thoại. Bắt đầu phiên mới.');
            }
        }

        // 3. Send Message Logic
        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            // UI Updates
            userInput.value = '';
            userInput.style.height = 'auto';
            appendMessage('user', message);

            // Create Placeholder for AI Response
            const aiMessageEl = appendMessage('model', '<i class="ph ph-spinner animate-spin"></i>');
            let fullResponse = "";

            try {
                // Determine URL based on Session ID
                const endpoint = SESSION_ID
                    ? `${API_BASE}/bots/${BOT_ID}/ask/${SESSION_ID}`
                    : `${API_BASE}/bots/${BOT_ID}/ask`;

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        message: message,
                        streaming: true // Enable streaming
                    })
                });

                if (!response.ok) throw new Error("API Error");

                // Handle SSE Stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                aiMessageEl.innerText = ""; // Clear spinner

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const jsonStr = line.substring(6);
                            if (jsonStr === '[DONE]') break;

                            try {
                                const data = JSON.parse(jsonStr);

                                // Capture new session ID
                                if (data.session_id) {
                                    SESSION_ID = data.session_id;
                                    console.log("New Session:", SESSION_ID);
                                }

                                // Append text chunk
                                if (data.response) {
                                    fullResponse += data.response;
                                    aiMessageEl.innerText = fullResponse;
                                    scrollToBottom();
                                }
                            } catch (err) {
                                console.warn("Parse Error:", err);
                            }
                        }
                    }
                }

            } catch (error) {
                console.error(error);
                aiMessageEl.innerHTML = '<span class="text-red-500">Lỗi kết nối. Vui lòng thử lại.</span>';
            }
        });

        // Initialize
        fetchBotDetails();
    </script>
</body>

</html>
