<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Bots - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans flex h-screen">

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden ml-64 relative">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <h1 class="text-xl font-semibold">Danh sách Chatbots</h1>
            <button onclick="openCreateModal()"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 flex items-center gap-2 shadow-sm transition">
                <i class="ph ph-plus-circle"></i> Tạo Bot mới
            </button>
        </header>

        <!-- Table Content -->
        <div class="flex-1 overflow-auto p-8">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b border-gray-200 text-xs uppercase text-gray-500 font-semibold">
                        <tr>
                            <th class="px-6 py-4">Tên Bot</th>
                            <th class="px-6 py-4">Mô hình (Model)</th>
                            <th class="px-6 py-4">Vai trò (Prompt)</th>
                            <th class="px-6 py-4">Trạng thái</th>
                            <th class="px-6 py-4 text-right">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="bot-list" class="divide-y divide-gray-100 text-sm">
                        <!-- Bot items will be loaded here -->
                        <tr>
                            <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                                <i class="ph ph-spinner animate-spin text-2xl"></i> Đang tải dữ liệu...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- CREATE BOT MODAL -->
    <div id="create-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
        <div class="bg-white w-full max-w-lg rounded-xl shadow-2xl p-6 relative animate-fade-in">
            <button onclick="closeCreateModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <i class="ph ph-x text-xl"></i>
            </button>

            <h2 class="text-xl font-bold mb-6 text-gray-800">Tạo Bot Mới</h2>

            <form id="createBotForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tên Bot</label>
                    <input type="text" id="botName" required placeholder="Ví dụ: Tư vấn tuyển sinh"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mô hình AI</label>
                    <select id="botModel"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                        <!-- Add more models if supported -->
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">System Prompt</label>
                    <textarea id="botPrompt" rows="4" required placeholder="Mô tả vai trò và nhiệm vụ của bot..."
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <div class="pt-2 flex justify-end gap-3">
                    <button type="button" onclick="closeCreateModal()"
                        class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">Hủy</button>
                    <button type="submit" id="btn-save"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-sm transition">Tạo
                        Bot</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const API_URL = "http://localhost:8000/api/v1/bots";
        const TOKEN = localStorage.getItem('token');

        // 1. Fetch Bots
        async function loadBots() {
            const tbody = document.getElementById('bot-list');

            try {
                const response = await fetch(API_URL, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });

                if (!response.ok) throw new Error('Failed to fetch bots');

                const bots = await response.json();
                renderBots(bots);

            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-red-500">Không thể tải danh sách bot. Vui lòng thử lại.</td></tr>`;
            }
        }

        // 2. Render Bots
        function renderBots(bots) {
            const tbody = document.getElementById('bot-list');
            if (bots.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">Chưa có bot nào. Hãy tạo mới ngay!</td></tr>`;
                return;
            }

            tbody.innerHTML = bots.map(bot => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-xl">
                                <i class="ph-fill ph-robot"></i>
                            </div>
                            <div>
                                <p class="font-bold text-gray-900">${bot.bot_name || 'Bot không tên'}</p>
                                <p class="text-xs text-gray-400">ID: ...${bot.id.slice(-6)}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="bg-gray-100 text-gray-700 px-2 py-1 rounded text-xs font-bold border border-gray-200">${bot.model_name}</span>
                    </td>
                    <td class="px-6 py-4 text-gray-500 max-w-xs truncate" title="${bot.system_prompt}">
                        ${bot.system_prompt}
                    </td>
                    <td class="px-6 py-4">
                        ${bot.is_active !== false
                    ? `<span class="flex items-center gap-2 text-green-600 font-medium bg-green-50 px-3 py-1 rounded-full w-fit"><span class="w-2 h-2 rounded-full bg-green-500"></span> Hoạt động</span>`
                    : `<span class="flex items-center gap-2 text-gray-500 font-medium bg-gray-100 px-3 py-1 rounded-full w-fit"><span class="w-2 h-2 rounded-full bg-gray-400"></span> Tạm dừng</span>`
                }
                    </td>
                    <td class="px-6 py-4 text-right space-x-2">
                        <button class="text-gray-400 hover:text-blue-600" title="Chỉnh sửa"><i class="ph ph-pencil-simple text-lg"></i></button>
                        <button onclick="deleteBot('${bot.id}')" class="text-gray-400 hover:text-red-600" title="Xóa"><i class="ph ph-trash text-lg"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // 3. Create Bot
        document.getElementById('createBotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            const originalText = btn.innerText;
            btn.innerText = "Đang tạo...";
            btn.disabled = true;

            const payload = {
                bot_name: document.getElementById('botName').value,
                model_name: document.getElementById('botModel').value,
                system_prompt: document.getElementById('botPrompt').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    closeCreateModal();
                    loadBots(); // Reload list
                    e.target.reset();
                } else {
                    alert('Lỗi khi tạo bot!');
                }
            } catch (error) {
                console.error(error);
                alert('Lỗi kết nối!');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        // 4. Delete Bot
        async function deleteBot(id) {
            if (!confirm('Bạn có chắc chắn muốn xóa bot này không?')) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });

                if (response.ok) {
                    loadBots();
                } else {
                    const err = await response.json();
                    alert('Lỗi: ' + (err.detail || 'Không thể xóa'));
                }
            } catch (error) {
                console.error(error);
                alert('Lỗi kết nối khi xóa!');
            }
        }

        // Modal Logic
        function openCreateModal() {
            document.getElementById('create-modal').classList.remove('hidden');
        }
        function closeCreateModal() {
            document.getElementById('create-modal').classList.add('hidden');
        }

        // Init
        document.addEventListener('DOMContentLoaded', loadBots);
    </script>
</body>

</html>
