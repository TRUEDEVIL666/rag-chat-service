<!-- Chatbot Partial -->
<div class="flex flex-col h-full bg-gray-50">
  <!-- Adjusted h-screen to h-full to fit in container -->

  <!-- HEADER -->
  <header class="bg-white border-b h-16 flex items-center justify-between px-6 shrink-0">
    <div class="flex items-center gap-4">
      <button onclick="window.history.back()" class="text-gray-500 hover:text-gray-700">
        <i class="ph ph-arrow-left text-xl"></i>
      </button>
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 rounded-full bg-primary-100 flex items-center justify-center text-primary-600 text-xl font-bold">
          <i class="ph-fill ph-robot"></i>
        </div>
        <div>
          <h1 id="bot-name" class="font-bold text-gray-800 text-lg leading-tight">Đang tải...</h1>
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-500"></span>
            <p id="bot-model" class="text-xs text-gray-500">...</p>
          </div>
        </div>
      </div>
    </div>

    <div>
      <button onclick="clearChat()" class="text-gray-400 hover:text-red-500 transition" title="Xóa đoạn chat">
        <i class="ph ph-trash text-xl"></i>
      </button>
    </div>
  </header>

  <!-- CHAT AREA -->
  <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 scroll-smooth">
    <!-- Content injected by JS -->
  </main>

  <!-- INPUT AREA -->
  <div class="bg-white border-t p-4 shrink-0">
    <div class="max-w-4xl mx-auto relative">
      <form id="chat-form" class="flex items-end gap-2">
        <div
          class="flex-1 bg-gray-100 rounded-2xl p-3 focus-within:ring-2 focus-within:ring-primary-100 transition border border-transparent focus-within:border-primary-200">
          <textarea id="user-input" rows="1"
            class="w-full bg-transparent border-none focus:ring-0 text-gray-700 placeholder-gray-400 resize-none max-h-32 focus:outline-none"
            placeholder="Nhập tin nhắn..." required></textarea>
        </div>
        <button type="submit" id="send-btn"
          class="bg-primary-600 hover:bg-primary-700 text-white p-3 rounded-full shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
          <i class="ph-fill ph-paper-plane-right text-xl"></i>
        </button>
      </form>
      <p class="text-center text-xs text-gray-400 mt-2">AI có thể mắc lỗi. Hãy kiểm chứng thông tin quan trọng.
      </p>
    </div>
  </div>
</div>

<style>
  /* Custom Markdown Styles to match user request */
  .prose pre {
    background-color: #f4f4f4 !important;
    padding: 1rem;
    border-radius: 0.5rem;
    overflow-x: auto;
    border: 1px solid #e5e7eb;
    color: #1f2937 !important;
    /* Dark text for contrast against light bg */
  }

  .prose code {
    background-color: #f3f4f6;
    padding: 0.2em 0.4em;
    border-radius: 0.25rem;
    font-size: 0.875em;
    color: #ef4444;
    /* Standard red-ish for inline code */
  }

  .prose pre code {
    background-color: transparent;
    color: inherit;
    padding: 0;
    border-radius: 0;
  }

  /* Dark mode overrides */
  .dark .prose pre {
    background-color: #1f2937 !important;
    border-color: #374151;
    color: #e5e7eb !important;
  }

  .dark .prose code {
    background-color: #374151;
    color: #f87171;
  }

  .dark .prose pre code {
    background-color: transparent;
    color: inherit;
  }
</style>

<script>
  {
    const API_BASE = import.meta.env.VITE_API_BASE;
    const hash = window.location.hash;
    const queryIndex = hash.indexOf('?');
    let BOT_ID = null;
    if (queryIndex !== -1) {
      const params = new URLSearchParams(hash.substring(queryIndex));
      BOT_ID = params.get('id');
    }
    let SESSION_ID = "";

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const botNameEl = document.getElementById('bot-name');
    const botModelEl = document.getElementById('bot-model');

    // Dynamic library loader with Promise
    async function ensureMarked() {
      if (typeof marked !== 'undefined') return Promise.resolve();
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/marked/marked.min.js";
        script.onload = () => {
          console.log("Marked loaded dynamically");
          resolve();
        };
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }


    const token = localStorage.getItem('token');
    if (!token) window.location.href = '#/login';

    if (!BOT_ID && window.location.pathname.includes('chatbot')) {
      // Only alert if we serve this page and expect ID.
      // alert("Thiếu Bot ID!");
      // window.history.back();
    }

    // State
    let currentOffset = 0;
    const limit = 20;
    let isLoadingHistory = false;
    let hasMoreHistory = true;

    // Functions
    function scrollToBottom() {
      if (chatContainer) chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function renderSkeleton() {
      chatContainer.innerHTML = `
                <div id="skeleton-loader" class="space-y-6 animate-pulse">
                    <div class="flex justify-start gap-3">
                        <div class="w-10 h-10 bg-gray-200 rounded-full"></div>
                        <div class="h-10 bg-gray-200 rounded-2xl w-1/3"></div>
                    </div>
                    <div class="flex justify-end gap-3">
                        <div class="h-10 bg-gray-200 rounded-2xl w-1/4"></div>
                    </div>
                    <div class="flex justify-start gap-3">
                        <div class="w-10 h-10 bg-gray-200 rounded-full"></div>
                        <div class="h-24 bg-gray-200 rounded-2xl w-2/3"></div>
                    </div>
                </div>
            `;
    }

    function removeSkeleton() {
      const loader = document.getElementById('skeleton-loader');
      if (loader) loader.remove();
    }

    function showDefaultWelcome() {
      chatContainer.innerHTML = `
                <div id="welcome-message" class="flex justify-start">
                    <div class="bg-white border border-gray-200 rounded-2xl p-4 max-w-[80%] shadow-sm">
                        <p class="text-gray-800">Xin chào! Tôi có thể giúp gì cho bạn hôm nay?</p>
                    </div>
                </div>
            `;
    }

    // Modified appendMessage to support prepend (for history)
    function appendMessage(role, text, prepend = false) {
      const div = document.createElement('div');
      div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;

      const contentClass = role === 'user'
        ? 'bg-primary-600 text-white rounded-2xl rounded-tr-sm'
        : 'bg-white border border-gray-200 text-gray-800 rounded-2xl rounded-tl-sm shadow-sm';

      // Check if role is AI (model or assistant)
      const isAI = role === 'model' || role === 'assistant';

      let contentHtml = text;
      if (isAI && typeof marked !== 'undefined') {
        contentHtml = marked.parse(text);
      } else if (isAI) {
        // Fallback if marked not loaded yet
        contentHtml = text.replace(/\n/g, '<br>');
      } else {
        // User message
        const tempDiv = document.createElement('div');
        tempDiv.innerText = text;
        contentHtml = tempDiv.innerHTML.replace(/\n/g, '<br>');
      }

      // prose style
      // Removed max-w-none to let prose constrain width (better readability)
      // Added prose-p:my-0 etc to reduce gaps if needed, but default prose is okay.
      // prose-sm typically 65ch width.
      const proseClass = isAI ? 'prose dark:prose-invert prose-sm' : '';

      div.innerHTML = `
                <div class="${contentClass} p-4 max-w-[80%] break-words message-content ${proseClass}">${contentHtml}</div>
            `;

      if (prepend && chatContainer.firstChild) {
        chatContainer.insertBefore(div, chatContainer.firstChild);
      } else {
        chatContainer.appendChild(div);
      }

      if (!prepend) scrollToBottom();
      return div.querySelector('.message-content');
    }

    window.clearChat = function () {
      if (confirm("Xóa lịch sử chat hiện tại?")) {
        chatContainer.innerHTML = '';
        SESSION_ID = "";
        appendMessage('system', 'Đã xóa hội thoại. Bắt đầu phiên mới.');
      }
    }

    async function fetchBotDetails() {
      if (!BOT_ID) return;
      try {
        const response = await fetch(`${API_BASE}/bots/${BOT_ID}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) throw new Error("Bot not found");

        const bot = await response.json();
        if (botNameEl) botNameEl.innerText = bot.name;
        if (botModelEl) botModelEl.innerText = bot.config_model?.model || "AI Model";

      } catch (error) {
        console.error(error);
        // alert("Không thể tải thông tin Bot.");
      }
    }

    // --- HISTORY LOGIC ---

    async function fetchLatestSession() {
      if (!BOT_ID) return;

      // Show Skeleton immediately
      renderSkeleton();

      try {
        // Fetch recent sessions
        const response = await fetch(`${API_BASE}/sessions?limit=20&offset=0`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) {
          removeSkeleton();
          showDefaultWelcome();
          return;
        }

        const sessions = await response.json();
        // Find most recent session for this bot
        const botSession = sessions.find(s => s.bot_id === BOT_ID);

        if (botSession) {
          SESSION_ID = botSession.id;
          console.log("Resuming Session:", SESSION_ID);
          await loadHistory(0);
        } else {
          console.log("No previous session found, starting fresh.");
          removeSkeleton();
          showDefaultWelcome();
        }

      } catch (e) {
        console.error("Error fetching session:", e);
        removeSkeleton();
        showDefaultWelcome();
      }
    }

    async function loadHistory(offset) {
      if (isLoadingHistory || !hasMoreHistory || !SESSION_ID) return;

      isLoadingHistory = true;

      // Save scroll height to maintain position after prepend
      const oldScrollHeight = chatContainer.scrollHeight;
      // const oldScrollTop = chatContainer.scrollTop; 

      // Show loading indicator if scrolling up (pagination)
      // If offset == 0, we already have skeleton (or we cleared it), but let's be safe.
      let loadingDiv = null;
      if (offset > 0) {
        loadingDiv = document.createElement('div');
        loadingDiv.className = 'w-full text-center py-2 text-xs text-gray-400';
        loadingDiv.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Loading history...';
        chatContainer.insertBefore(loadingDiv, chatContainer.firstChild);
      }

      try {
        const response = await fetch(`${API_BASE}/chat-messages/${SESSION_ID}?limit=${limit}&offset=${offset}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        // If offset 0 and fail -> clear skeleton
        if (!response.ok) {
          if (offset === 0) {
            removeSkeleton();
            showDefaultWelcome();
          }
          throw new Error("Failed to load history");
        }

        const data = await response.json();
        const messages = data.items || [];

        if (messages.length < limit) {
          hasMoreHistory = false;
        }

        // Remove temp loader
        if (loadingDiv) loadingDiv.remove();

        // If initial load and no messages, show default
        if (offset === 0) {
          removeSkeleton(); // Clear skeleton before adding messages
          if (messages.length === 0) {
            showDefaultWelcome();
            isLoadingHistory = false;
            return; // Done
          }
        }

        messages.forEach(msg => {
          // Adapt message structure if needed (assuming msg.role and msg.content)
          appendMessage(msg.role, msg.content, true);
        });

        currentOffset += messages.length;

        // Adjust scroll position to prevent jump
        if (offset > 0) {
          const newScrollHeight = chatContainer.scrollHeight;
          const heightDiff = newScrollHeight - oldScrollHeight;
          chatContainer.scrollTop = heightDiff; // Valid for keeping view stable
        } else {
          scrollToBottom(); // First load -> bottom
        }

      } catch (e) {
        console.error(e);
        if (loadingDiv) loadingDiv.remove();
        if (offset === 0) {
          removeSkeleton();
          showDefaultWelcome(); // Fallback
        }
      } finally {
        isLoadingHistory = false;
      }
    }

    // Scroll Event
    if (chatContainer) {
      chatContainer.addEventListener('scroll', () => {
        if (chatContainer.scrollTop < 50 && hasMoreHistory && !isLoadingHistory && SESSION_ID) {
          loadHistory(currentOffset);
        }
      });
    }


    // Setup Event Listeners
    if (userInput) {
      userInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
      });

      userInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          document.getElementById('chat-form').dispatchEvent(new Event('submit'));
        }
      });
    }

    const chatForm = document.getElementById('chat-form');
    if (chatForm) {
      chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = userInput.value.trim();
        if (!message) return;

        // If this is the FIRST message and we are showing Default Welcome, clear it first

        // Remove welcome message if present
        const welcomeEl = document.getElementById('welcome-message');
        if (welcomeEl) welcomeEl.remove();

        userInput.value = '';
        userInput.style.height = 'auto';
        appendMessage('user', message);

        const aiMessageEl = appendMessage('model', '<i class="ph ph-spinner animate-spin"></i>');
        let fullResponse = "";

        try {
          const endpoint = SESSION_ID
            ? `${API_BASE}/bots/${BOT_ID}/ask/${SESSION_ID}`
            : `${API_BASE}/bots/${BOT_ID}/ask`;

          const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
              message: message,
              streaming: true
            })
          });

          if (!response.ok) throw new Error("API Error");

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          aiMessageEl.innerText = "";

          // Simple interval to attempt to render markdown if marked loads late
          let markedCheckInterval = null;
          if (typeof marked === 'undefined') {
            markedCheckInterval = setInterval(() => {
              if (typeof marked !== 'undefined') {
                clearInterval(markedCheckInterval);
                if (fullResponse) aiMessageEl.innerHTML = marked.parse(fullResponse);
              }
            }, 500);
          }

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n\n');

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const jsonStr = line.substring(6);
                if (jsonStr === '[DONE]') break;

                try {
                  const data = JSON.parse(jsonStr);

                  if (data.session_id) {
                    SESSION_ID = data.session_id;
                  }

                  if (data.response) {
                    fullResponse += data.response;
                    // Parse Markdown on the fly if library exists
                    if (typeof marked !== 'undefined') {
                      aiMessageEl.innerHTML = marked.parse(fullResponse);
                    } else {
                      aiMessageEl.innerText = fullResponse;
                    }
                    scrollToBottom();
                  }
                } catch (err) {
                  console.warn("Parse Error:", err);
                }
              }
            }
          }
          if (markedCheckInterval) clearInterval(markedCheckInterval);

        } catch (error) {
          console.error(error);
          aiMessageEl.innerHTML = '<span class="text-red-500">Lỗi kết nối. Vui lòng thử lại.</span>';
        }
      });
    }

    // Init
    (async () => {
      fetchBotDetails();
      try {
        await ensureMarked();
      } catch (e) {
        console.error("Failed to load marked.js", e);
      }
      fetchLatestSession();
    })();
  }
</script>
