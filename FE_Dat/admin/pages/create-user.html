<!-- Header -->
<header
    class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-10 sticky top-0 z-40">
    <div class="flex items-center gap-4">
        <a href="#users"
            class="p-2 hover:bg-slate-50 rounded-full transition text-slate-400 hover:text-primary-600">
            <i class="ph ph-arrow-left text-2xl"></i>
        </a>
        <div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Thêm Người Dùng</h1>
            <p class="text-sm text-slate-400 font-medium">Tạo tài khoản mới trong hệ thống</p>
        </div>
    </div>

    <div class="flex items-center gap-4">
        <span class="text-xs font-bold text-slate-300 uppercase tracking-widest">Bước 1/1: Thông tin cơ
            bản</span>
    </div>
</header>

<!-- Form Scroll Area -->
<div class="flex-1 overflow-auto p-10 flex justify-center">

    <div class="w-full max-w-4xl animate-slide-up">

        <form id="createProfileForm" class="grid grid-cols-1 lg:grid-cols-12 gap-10">

            <!-- LEFT COLUMN: Profile Visual -->
            <div class="lg:col-span-4 flex flex-col items-center">
                <div class="glass-card w-full rounded-3xl p-8 flex flex-col items-center text-center">
                    <div class="relative group cursor-pointer">
                        <div id="avatarPlaceholder"
                            class="w-32 h-32 rounded-3xl avatar-preview flex items-center justify-center text-slate-400 text-5xl mb-6 shadow-inner transition group-hover:scale-105">
                            <i class="ph ph-user"></i>
                        </div>
                        <div
                            class="absolute -bottom-1 -right-1 w-10 h-10 bg-white rounded-2xl shadow-lg border border-slate-50 flex items-center justify-center text-primary-600">
                            <i class="ph-fill ph-camera text-xl"></i>
                        </div>
                    </div>
                    <h3 class="font-bold text-slate-800 text-lg" id="previewEmail">Tài khoản mới</h3>
                    <p class="text-xs text-slate-400 mt-1 uppercase tracking-tighter font-bold"
                        id="previewRole">Thành viên</p>

                    <div class="mt-8 pt-8 border-t border-slate-50 w-full text-left space-y-4">
                        <div class="flex items-center gap-3 text-sm text-slate-500">
                            <i class="ph ph-shield-check text-green-500 text-lg"></i>
                            <span>Bảo mật 2 lớp tự động</span>
                        </div>
                        <div class="flex items-center gap-3 text-sm text-slate-500">
                            <i class="ph ph-key text-primary-500 text-lg"></i>
                            <span>Tự động gán quyền truy cập</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Form Fields -->
            <div class="lg:col-span-8 flex flex-col gap-6">

                <div class="glass-card rounded-3xl p-10 space-y-8">

                    <!-- Section: Identity -->
                    <div>
                        <h4 class="text-sm font-bold text-primary-600 uppercase tracking-widest mb-6">Định danh tài
                            khoản</h4>
                        <div class="grid grid-cols-1 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-2">Địa chỉ
                                    Email</label>
                                <div class="relative">
                                    <i
                                        class="ph ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                    <input type="email" id="userEmail" required placeholder="example@domain.com"
                                        class="form-input w-full pl-12 pr-4 py-3.5 bg-slate-50/50 rounded-2xl outline-none text-slate-700"
                                        oninput="document.getElementById('previewEmail').innerText = this.value || 'Tài khoản mới'">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Section: Credentials -->
                    <div>
                        <h4 class="text-sm font-bold text-primary-600 uppercase tracking-widest mb-6">Thông tin bảo
                            mật</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-2">Mật khẩu</label>
                                <div class="relative">
                                    <i
                                        class="ph ph-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                    <input type="password" id="userPassword" required placeholder="••••••••"
                                        class="form-input w-full pl-12 pr-4 py-3.5 bg-slate-50/50 rounded-2xl outline-none text-slate-700">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-2">Nhập lại mật
                                    khẩu</label>
                                <div class="relative">
                                    <i
                                        class="ph ph-check-square absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                    <input type="password" id="confirmPassword" required placeholder="••••••••"
                                        class="form-input w-full pl-12 pr-4 py-3.5 bg-slate-50/50 rounded-2xl outline-none text-slate-700">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Section: Role & Tenant -->
                    <div>
                        <h4 class="text-sm font-bold text-primary-600 uppercase tracking-widest mb-6">Phân quyền hệ
                            thống</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-2">Vai trò người
                                    dùng</label>
                                <div class="relative">
                                    <i
                                        class="ph ph-identification-badge absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                    <select id="userRole"
                                        class="form-input w-full pl-12 pr-10 py-3.5 bg-slate-50/50 rounded-2xl outline-none text-slate-700 appearance-none cursor-pointer"
                                        onchange="document.getElementById('previewRole').innerText = this.options[this.selectedIndex].text">
                                        <option value="user">Thành viên (User)</option>
                                        <option value="admin">Quản trị viên (Admin)</option>
                                    </select>
                                    <i
                                        class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-2">Mã Tenant (Tùy
                                    chọn)</label>
                                <div class="relative">
                                    <i
                                        class="ph ph-hash-straight absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                    <input type="text" id="tenantId" placeholder="Mặc định: Hệ thống chung"
                                        class="form-input w-full pl-12 pr-4 py-3.5 bg-slate-50/50 rounded-2xl outline-none text-slate-700">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="pt-6 flex items-center justify-between border-t border-slate-50">
                        <p id="msg-box" class="text-sm font-medium"></p>
                        <div class="flex gap-4">
                            <button type="button" onclick="window.history.back()"
                                class="px-8 py-3.5 text-slate-500 font-bold hover:bg-slate-50 rounded-2xl transition">Hủy
                                bỏ</button>
                            <button type="submit" id="btn-submit"
                                class="gradient-btn px-10 py-3.5 text-white font-bold rounded-2xl shadow-lg flex items-center gap-2">
                                <span>Xác nhận & Tạo mới</span>
                                <i class="ph-bold ph-arrow-right"></i>
                            </button>
                        </div>
                    </div>

                </div>
            </div>

        </form>

    </div>

</div>

<script>
    {
        const API_URL = "http://localhost:8000/api/v1/users";
        const TOKEN = localStorage.getItem('token');
        if (!TOKEN) {
            window.location.href = '#/login';
        }

        // define helper locally
        const showMsg = (text, colorClass) => {
            const msgBox = document.getElementById('msg-box');
            if (msgBox) {
                msgBox.innerText = text;
                msgBox.className = `text-sm font-medium ${colorClass}`;
            }
        };

        const form = document.getElementById('createProfileForm');
        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btn-submit');
                const msgBox = document.getElementById('msg-box');

                const password = document.getElementById('userPassword').value;
                const confirm = document.getElementById('confirmPassword').value;

                if (password !== confirm) {
                    showMsg("Mật khẩu không khớp!", "text-red-500");
                    return;
                }

                // Loading state
                btn.disabled = true;
                btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> <span>Đang xử lý...</span>';
                if(msgBox) msgBox.innerText = "";

                const payload = {
                    email: document.getElementById('userEmail').value,
                    password: password,
                    role: document.getElementById('userRole').value,
                    tenant_id: document.getElementById('tenantId').value || null
                };

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${TOKEN}`
                        },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        showMsg("Tạo người dùng thành công!", "text-green-500");
                        setTimeout(() => {
                            if(window.Router) window.Router.navigate('#users');
                        }, 1500);
                    } else {
                        const data = await response.json();
                        showMsg(data.detail || "Đã có lỗi xảy ra!", "text-red-500");
                        btn.disabled = false;
                        btn.innerHTML = '<span>Xác nhận & Tạo mới</span> <i class="ph-bold ph-arrow-right"></i>';
                    }
                } catch (error) {
                    console.error(error);
                    showMsg("Không thể kết nối API!", "text-red-500");
                    btn.disabled = false;
                    btn.innerHTML = '<span>Xác nhận & Tạo mới</span> <i class="ph-bold ph-arrow-right"></i>';
                }
            });
        }
    }
</script>
