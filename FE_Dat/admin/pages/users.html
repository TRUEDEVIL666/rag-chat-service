<!-- USERS PAGE CONTENT -->
<div class="flex-1 flex flex-col overflow-hidden relative" id="users-content">
    
    <!-- Header -->
    <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-8">
        <h1 class="text-xl font-semibold text-gray-800 dark:text-white">Danh sách Người dùng</h1>
        <button onclick="window.Router.navigate('#create-user')"
            class="bg-primary-600 text-white px-4 py-2 rounded-lg hover:bg-primary-700 flex items-center gap-2 shadow-sm transition">
            <i class="ph ph-user-plus"></i> Thêm User mới
        </button>
    </header>

    <!-- Table Content -->
    <div class="flex-1 overflow-auto p-8">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-700 text-xs uppercase text-gray-500 dark:text-gray-400 font-semibold">
                    <tr>
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">Tenant ID</th>
                        <th class="px-6 py-4">Email</th>
                        <th class="px-6 py-4">Role</th>
                        <th class="px-6 py-4">Created At</th>
                        <th class="px-6 py-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="user-list" class="divide-y divide-gray-100 dark:divide-gray-700 text-sm">
                    <tr>
                        <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                            <i class="ph ph-spinner animate-spin text-2xl"></i> Đang tải dữ liệu...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function() {
        // Scoped Application Logic for Users Page
        const API_URL = "http://localhost:8000/api/v1/users";
        const TOKEN = localStorage.getItem('token');
        
        // Expose deleteUser globally for onclick handlers
        // (Alternative: Event delegation on the table)
        window.deleteUser = async function(id) {
            if (!confirm('Bạn có chắc chắn muốn xóa user này không? Hành động này không thể hoàn tác!')) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });

                if (response.ok) {
                    loadUsers();
                } else {
                    const err = await response.json();
                    alert('Lỗi: ' + (err.detail || 'Không thể xóa'));
                }
            } catch (error) {
                console.error(error);
                alert('Lỗi kết nối!');
            }
        };

        if (!TOKEN) {
            window.location.href = '../login.html';
            return;
        }

        // 1. Fetch Users
        async function loadUsers() {
            const tbody = document.getElementById('user-list');
            if(!tbody) return;
            
            // Show Loading
            tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500"><i class="ph ph-spinner animate-spin text-2xl"></i> Đang tải dữ liệu...</td></tr>`;

            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = '../login.html'; 
                        return;
                    }
                    const err = await response.json();
                    throw new Error(err.detail || "Không thể tải danh sách người dùng");
                }

                const users = await response.json();
                renderUsers(users);

            } catch (error) {
                console.error(error);
                if(tbody) tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-red-500">Lỗi: ${error.message}</td></tr>`;
            }
        }

        // 2. Render Users
        function renderUsers(users) {
            const tbody = document.getElementById('user-list');
            if (!tbody) return;
            
            if (users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">Chưa có user nào.</td></tr>`;
                return;
            }

            tbody.innerHTML = users.map(user => `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                    <td class="px-6 py-4 font-mono text-xs text-gray-500 dark:text-gray-400 truncate max-w-[100px]" title="${user.id}">
                        ${user.id}
                    </td>
                    <td class="px-6 py-4 font-mono text-xs text-gray-500 dark:text-gray-400 truncate max-w-[100px]" title="${user.tenant_id || ''}">
                        ${user.tenant_id || '-'}
                    </td>
                    <td class="px-6 py-4 font-medium text-gray-900 dark:text-gray-200">
                        ${user.email}
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded text-xs font-bold border ${user.role === 'admin' ? 'bg-purple-100 text-purple-700 border-purple-200 dark:bg-purple-900/30 dark:text-purple-300 dark:border-purple-800' : 'bg-primary-100 text-primary-700 border-primary-200 dark:bg-primary-900/30 dark:text-primary-300 dark:border-primary-800'}">
                            ${user.role}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-gray-500 dark:text-gray-400 text-xs">
                        ${new Date(user.created_at).toLocaleString('vi-VN')}
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="deleteUser('${user.id}')" class="text-gray-400 dark:text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition" title="Xóa User">
                            <i class="ph ph-trash text-lg"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Initial Load
        loadUsers();
    })();
</script>
