<!-- BOTS PAGE CONTENT -->
<div class="flex-1 flex flex-col h-full overflow-hidden relative">
    <!-- Page Header (Specific to this page) -->
    <div class="h-16 bg-white dark:bg-gray-800 dark:border-gray-700 border-b border-gray-200 flex items-center justify-between px-8">
        <h1 class="text-xl font-semibold text-gray-900 dark:text-white" data-i18n="bots_title">Danh sách Chatbots</h1>
        <button onclick="window.Router.navigate('#create-bot')"
            class="bg-primary-600 text-white px-4 py-2 rounded-lg hover:bg-primary-700 flex items-center gap-2 shadow-sm transition">
            <i class="ph ph-plus-circle"></i> <span data-i18n="btn_create_bot">Tạo Bot mới</span>
        </button>
    </div>

    <!-- Table Content -->
    <div class="flex-1 overflow-auto p-8">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-600 text-xs uppercase text-gray-500 dark:text-gray-300 font-semibold">
                    <tr>
                        <th class="px-6 py-4" data-i18n="th_bot_name">Tên Bot</th>
                        <th class="px-6 py-4" data-i18n="th_model">Mô hình (Model)</th>
                        <th class="px-6 py-4" data-i18n="th_prompt">Vai trò (Prompt)</th>
                        <th class="px-6 py-4" data-i18n="th_status">Trạng thái</th>
                        <th class="px-6 py-4 text-right" data-i18n="th_action">Hành động</th>
                    </tr>
                </thead>
                <tbody id="bot-list" class="divide-y divide-gray-100 dark:divide-gray-700 text-sm dark:text-gray-300">
                    <!-- Bot items will be loaded here -->
                    <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-gray-500 dark:text-gray-400">
                            <i class="ph ph-spinner animate-spin text-2xl mb-2"></i>
                            <p data-i18n="loading">Đang tải dữ liệu...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function() {
        // Encapsulate to avoid global pollution
        const tbody = document.getElementById('bot-list');
        const API_BASE = "http://localhost:8000/api/v1";

        // 1. Check Authentication
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '../login.html';
            return;
        }

        // 2. Fetch API
        async function fetchBots() {
            try {
                const response = await fetch(`${API_BASE}/bots`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401) {
                    console.error('Unauthorized: invalid token');
                    localStorage.removeItem('token');
                    window.location.href = '../login.html';
                    return;
                }

                if (!response.ok) {
                    const errText = await response.text();
                    console.error('Fetch error:', response.status, errText);
                    throw new Error('Failed to fetch bots: ' + response.status);
                }

                const bots = await response.json();
                renderBots(bots);

            } catch (error) {
                console.error('Error fetching bots:', error);
                if (tbody) {
                     tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="px-6 py-12 text-center text-red-500">
                                <i class="ph ph-warning text-2xl mb-2"></i>
                                <p>Không thể tải dữ liệu. Vui lòng thử lại sau.</p>
                            </td>
                        </tr>
                    `;
                }
            }
        }

        // 3. Render Data
        function renderBots(bots) {
            if (!tbody) return;
            
            if (!bots || bots.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                            <p>Chưa có Bot nào. Hãy tạo mới!</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = bots.map(bot => {
                // Xử lý dữ liệu an toàn (Safety checks)
                const modelName = bot.config_model?.model || 'Chưa cấu hình';
                const promptText = bot.config_prompt || bot.description || 'Chưa có mô tả';
                const status = 'active'; // Backend chưa có field status, mặc định active
                const color = 'primary';    // Random hoặc cố định
                const icon = 'ph-robot';

                return `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-${color}-100 dark:bg-${color}-900/30 flex items-center justify-center text-${color}-600 dark:text-${color}-400 text-xl shadow-sm">
                                <i class="ph-fill ${icon}"></i>
                            </div>
                            <div>
                                <p class="font-bold text-gray-900 dark:text-gray-100">${bot.name}</p>
                                <p class="text-[10px] text-gray-400 font-mono">ID: ${bot.id}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="bg-gray-100 dark:bg-gray-600 text-gray-700 dark:text-gray-200 px-2 py-1 rounded text-[11px] font-bold border border-gray-200 dark:border-gray-500">
                            ${modelName}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-gray-500 dark:text-gray-400 max-w-xs truncate" title="${promptText}">
                        ${promptText}
                    </td>
                    <td class="px-6 py-4">
                            <span class="flex items-center gap-2 text-green-600 font-bold bg-green-50 dark:bg-green-900/30 px-3 py-1 rounded-full w-fit text-[11px]">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> Hoạt động
                            </span>
                    </td>
                    <td class="px-6 py-4 text-right space-x-2">
                        <button onclick="window.Router.navigate('#chatbot?id=${bot.id}')" class="text-gray-400 hover:text-green-600 transition" title="Chat với Bot"><i class="ph ph-chat-circle-dots text-lg"></i></button>
                        <button onclick="window.Router.navigate('#edit-bot?id=${bot.id}')" class="text-gray-400 hover:text-primary-600 transition" title="Chỉnh sửa"><i class="ph ph-pencil-simple text-lg"></i></button>
                        <button class="text-gray-400 hover:text-purple-600 transition" title="Cấu hình Knowledge"><i class="ph ph-books text-lg"></i></button>
                        <button class="text-gray-400 hover:text-red-600 transition" title="Xóa"><i class="ph ph-trash text-lg"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        // Run
        fetchBots();
    })();
</script>
