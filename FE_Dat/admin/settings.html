<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans flex h-screen">

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden ml-64 relative">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <h1 class="text-xl font-semibold">Cài đặt Hệ thống</h1>
        </header>

        <!-- Content -->
        <div class="flex-1 overflow-auto p-8">
            <div class="max-w-3xl space-y-8">

                <!-- 1. Profile Information -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                    <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
                        <i class="ph-fill ph-user-circle text-blue-600"></i> Thông tin tài khoản
                    </h2>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">Email đăng nhập</label>
                            <div class="flex items-center gap-2">
                                <input type="text" id="profileEmail" disabled
                                    class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-gray-600 cursor-not-allowed"
                                    value="Đang tải...">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">Vai trò (Role)</label>
                            <div id="profileRoleBadge">
                                <span
                                    class="bg-gray-100 text-gray-500 px-3 py-2 rounded-lg text-sm font-medium border border-gray-200 inline-block w-full">Loading...</span>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">Mã Tenant</label>
                            <input type="text" id="profileTenant" disabled
                                class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-gray-500 font-mono text-sm cursor-not-allowed"
                                value="...">
                        </div>
                    </div>
                </div>

                <!-- 2. Change Password (UI ONLY) -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 relative overflow-hidden">
                    <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
                        <i class="ph-fill ph-lock-key text-orange-600"></i> Đổi mật khẩu
                    </h2>

                    <div class="absolute top-0 right-0 p-4">
                        <span
                            class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-xs font-bold border border-yellow-200">
                            Tính năng đang phát triển
                        </span>
                    </div>

                    <form onsubmit="event.preventDefault(); alert('Tính năng này chưa được hỗ trợ bởi Backend API.');"
                        class="space-y-4 max-w-md">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu hiện tại</label>
                            <input type="password"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu mới</label>
                            <input type="password"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Xác nhận mật khẩu mới</label>
                            <input type="password"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <button type="submit"
                            class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 shadow-sm transition font-medium">
                            Lưu thay đổi
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        // Simple logic to parse JWT tokenPayload (since we don't have a /me endpoint that returns everything plainly yet, or we can use the one available)
        // Actually, let's just decode the JWT from localStorage if possible, OR call an API.
        // Wait, 'BE/app/api/v1/users.py' -> get_all_users checks current_user.
        // There is no specific "get my profile" endpoint exposed easily unless we parse token or add one.
        // BUT, we can decode the token simple client-side to show email/role if it's in there.
        // Looking at 'BE/app/services/auth/auth_service.py' (from search earlier), the token usually has sub, email, role.

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function (c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    // Try to decode token to get info
                    // Note: This depends on what Supabase/Backend puts in the token.
                    // If it fails, we just show "Unknown".
                    const decoded = parseJwt(token);
                    console.log(decoded);

                    // Update UI
                    // Email might be in 'email' or 'sub'
                    const email = decoded.email || decoded.sub || "Unknown";
                    document.getElementById('profileEmail').value = email;

                    // Role
                    const role = decoded.role || decoded.app_metadata?.role || "user";
                    const badgeClass = role === 'admin'
                        ? "bg-purple-100 text-purple-700 border-purple-200"
                        : "bg-blue-100 text-blue-700 border-blue-200";

                    document.getElementById('profileRoleBadge').innerHTML = `
                        <span class="${badgeClass} px-3 py-2 rounded-lg text-sm font-bold border inline-block w-full text-center uppercase tracking-wider">
                            ${role}
                        </span>
                    `;

                    // Tenant ??
                    // Typically 'tenant_id' or 'app_metadata.tenant_id'
                    const tenant = decoded.tenant_id || decoded.app_metadata?.tenant_id || "N/A";
                    document.getElementById('profileTenant').value = tenant;

                } catch (e) {
                    console.error("Invalid Token", e);
                }
            }
        });
    </script>
</body>

</html>
