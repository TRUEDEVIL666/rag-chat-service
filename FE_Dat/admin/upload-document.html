<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Tài liệu - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --secondary: #6366F1;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #f8fafc;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .upload-zone {
            border: 2px dashed #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
            transform: scale(1.01);
        }

        .gradient-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            transition: all 0.3s ease;
        }

        .gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
            filter: brightness(1.1);
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-input {
            transition: all 0.2s ease;
            border-color: #e2e8f0;
        }

        .form-input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden text-slate-700">

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden ml-64 relative bg-[#fbfcfd]">

        <!-- Header -->
        <header
            class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-10 sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <a href="documents.html"
                    class="p-2 hover:bg-slate-50 rounded-full transition text-slate-400 hover:text-primary">
                    <i class="ph ph-arrow-left text-2xl"></i>
                </a>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Upload Tài liệu</h1>
                    <p class="text-sm text-slate-400 font-medium">Bổ sung kiến thức cho hệ thống RAG</p>
                </div>
            </div>
        </header>

        <!-- Form Scroll Area -->
        <div class="flex-1 overflow-auto p-10 flex justify-center">

            <div class="w-full max-w-4xl animate-slide-up">

                <form id="uploadForm" class="grid grid-cols-1 lg:grid-cols-12 gap-10">

                    <!-- LEFT COLUMN: Files & Dropzone -->
                    <div class="lg:col-span-12">
                        <div class="glass-card rounded-3xl p-10 space-y-8">

                            <!-- Section: Selection -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <label
                                        class="block text-sm font-bold text-primary uppercase tracking-widest mb-4">Chọn
                                        Kho Kiến Thức (Knowledge Base)</label>
                                    <div class="relative">
                                        <i
                                            class="ph ph-books absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                        <select id="chunkingMethod" onchange="updateChunkPreview()"
                                            class="form-input w-full pl-12 pr-10 py-3.5 bg-slate-50/50 rounded-2xl outline-none text-slate-700 appearance-none cursor-pointer">
                                            <option value="sentence">Sentence (Tách câu)</option>
                                            <option value="semantic">Semantic (Ngữ nghĩa/Đoạn)</option>
                                            <option value="token">Token (Giả lập Token)</option>
                                            <option value="character">Character (Ký tự cố định)</option>
                                            <option value="word">Word (Từ)</option>
                                            <option value="recursive">Recursive (Đệ quy)</option>
                                            <option value="hierarchical">Hierarchical (Phân cấp)</option>
                                            <option value="sliding">Sliding Window (Cửa sổ trượt)</option>
                                        </select>
                                        <i
                                            class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                                    </div>
                                </div>
                                <div>
                                    <label
                                        class="block text-sm font-bold text-primary uppercase tracking-widest mb-4">Phương
                                        thức Chunking</label>
                                    <div class="relative">
                                        <i
                                            class="ph ph-scissors absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                        <select id="chunkingMethod" onchange="updateChunkPreview()"
                                            class="form-input w-full pl-12 pr-10 py-3.5 bg-slate-50/50 rounded-2xl outline-none text-slate-700 appearance-none cursor-pointer">
                                            <option value="sentence">Tách theo câu (Sentence)</option>
                                            <option value="paragraph">Tách theo đoạn (Paragraph)</option>
                                            <option value="markdown">Theo cấu trúc Markdown</option>
                                            <option value="naive">Naive (Độ dài cố định)</option>
                                        </select>
                                        <i
                                            class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                                    </div>
                                </div>
                            </div>

                            <!-- New Section: Chunking Preview -->
                            <div class="bg-indigo-50/30 rounded-3xl p-8 border border-indigo-100/50 space-y-6">
                                <div class="flex items-center gap-3 mb-2">
                                    <div
                                        class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 shadow-sm">
                                        <i class="ph-bold ph-eye text-xl"></i>
                                    </div>
                                    <div>
                                        <h3 class="text-lg font-bold text-slate-800">Xem trước kết quả Chunking</h3>
                                        <p class="text-xs text-slate-500 font-medium">Thử nghiệm cách hệ thống phân rã
                                            tài liệu của bạn</p>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label
                                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Văn
                                            bản mẫu</label>
                                        <textarea id="previewInput" oninput="updateChunkPreview()" rows="5"
                                            class="w-full p-4 bg-white border border-slate-200 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-100 transition resize-none"
                                            placeholder="Nhập một đoạn văn bản dài để thử nghiệm...">RAG (Retrieval-Augmented Generation) là một kỹ thuật tối ưu hóa đầu ra của các mô hình ngôn ngữ lớn (LLM) bằng cách tham chiếu đến một cơ sở tri thức đáng tin cậy bên ngoài trước khi tạo phản hồi. Thay vì chỉ dựa vào dữ liệu huấn luyện cố định, RAG cho phép hệ thống tìm kiếm thông tin mới nhất và phù hợp nhất từ tài liệu doanh nghiệp, giúp giảm thiểu ảo giác (hallucination) và tăng tính chính xác cho câu trả lời.

Quá trình Chunking (phân mảnh dữ liệu) đóng vai trò cốt lõi trong hệ thống RAG. Tài liệu gốc cần được chia nhỏ thành các đoạn văn bản có kích thước phù hợp để mô hình nhúng (Embedding Model) có thể xử lý hiệu quả. Nếu chunk quá lớn, ngữ cảnh có thể bị loãng; ngược lại, nếu chunk quá nhỏ, thông tin có thể bị cắt vụn và mất đi ý nghĩa liên kết. Việc lựa chọn chiến lược chunking như Semantic, Sentence hay Token phụ thuộc vào cấu trúc dữ liệu đầu vào.

Đối với các tài liệu kỹ thuật phức tạp, phương pháp Hierarchical Chunking (phân mảnh phân cấp) thường mang lại hiệu quả cao nhất. Phương pháp này tạo ra các chunk tóm tắt ở cấp cao để tìm kiếm nhanh, đồng thời liên kết với các chunk chi tiết con để cung cấp ngữ cảnh đầy đủ cho LLM. Nhờ đó, hệ thống vừa đảm bảo tốc độ truy xuất, vừa giữ được độ sâu của thông tin khi cần giải thích chi tiết các khái niệm khó.</textarea>
                                    </div>
                                    <div>
                                        <label
                                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Kết
                                            quả phân mảnh (Chunks)</label>
                                        <div id="previewResult" class="w-full h-[126px] overflow-auto space-y-2 pr-2">
                                            <!-- Chunks will appear here -->
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Section: Upload Zone -->
                            <div>
                                <label class="block text-sm font-bold text-primary uppercase tracking-widest mb-4">Tài
                                    liệu tải lên</label>
                                <div id="dropzone"
                                    class="upload-zone rounded-3xl p-12 flex flex-col items-center justify-center text-center cursor-pointer">
                                    <input type="file" id="fileInput" multiple class="hidden"
                                        accept=".pdf,.docx,.txt,.md,.json">
                                    <div
                                        class="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center text-primary text-4xl mb-6">
                                        <i class="ph ph-cloud-arrow-up"></i>
                                    </div>
                                    <h3 class="text-xl font-bold text-slate-800 mb-2">Kéo thả file vào đây</h3>
                                    <p class="text-slate-400 mb-6">Hỗ trợ PDF, PPTX, DOCX, TXT, Markdown (Tối đa 50MB)
                                    </p>
                                    <button type="button" onclick="document.getElementById('fileInput').click()"
                                        class="bg-white border border-slate-200 px-6 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition shadow-sm">
                                        Chọn từ máy tính
                                    </button>
                                </div>

                                <!-- File Preview List -->
                                <div id="fileList" class="mt-6 space-y-3">
                                    <!-- Files will appear here -->
                                </div>
                            </div>

                            <!-- Action Buttons -->
                            <div class="pt-8 flex items-center justify-between border-t border-slate-50">
                                <p id="msg-box" class="text-sm font-medium"></p>
                                <div class="flex gap-4">
                                    <button type="button" onclick="window.history.back()"
                                        class="px-8 py-3.5 text-slate-500 font-bold hover:bg-slate-50 rounded-2xl transition">Hủy
                                        bỏ</button>
                                    <button type="submit" id="btn-submit"
                                        class="gradient-btn px-10 py-3.5 text-white font-bold rounded-2xl shadow-lg flex items-center gap-2">
                                        <span>Bắt đầu Upload & Xử lý</span>
                                        <i class="ph-bold ph-paper-plane-tilt"></i>
                                    </button>
                                </div>
                            </div>

                        </div>
                    </div>

                </form>

            </div>

        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        const API_URL = "http://localhost:8000/api/v1/upload-file";
        const TOKEN = localStorage.getItem('token');
        if (!TOKEN) {
            window.location.href = '../login.html';
        }
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        let selectedFiles = [];

        // Handle Drag & Drop
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('dragover'); });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!selectedFiles.find(f => f.name === file.name)) {
                    selectedFiles.push(file);
                    addFileToList(file);
                }
            });
        }

        function addFileToList(file) {
            const div = document.createElement('div');
            div.className = "flex items-center justify-between bg-white border border-slate-100 p-4 rounded-2xl animate-slide-up shadow-sm";
            div.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400">
                        <i class="ph ph-file-text text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-slate-700">${file.name}</p>
                        <p class="text-xs text-slate-400">${(file.size / 1024).toFixed(1)} KB</p>
                    </div>
                </div>
                <button type="button" onclick="removeFile('${file.name}', this)" class="p-2 text-slate-300 hover:text-red-500 transition">
                    <i class="ph ph-trash text-lg"></i>
                </button>
            `;
            fileList.appendChild(div);
        }

        function removeFile(name, btn) {
            selectedFiles = selectedFiles.filter(f => f.name !== name);
            btn.parentElement.remove();
        }

        // Handle Submit
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const msgBox = document.getElementById('msg-box');

            if (selectedFiles.length === 0) {
                showMsg("Vui lòng chọn ít nhất 1 file!", "text-red-500");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> <span>Đang xử lý...</span>';
            msgBox.innerText = "";

            const formData = new FormData();
            formData.append("knowledge_base_id", document.getElementById('kbId').value);
            formData.append("chunking_method", document.getElementById('chunkingMethod').value);
            selectedFiles.forEach(file => {
                formData.append("files", file);
            });

            try {
                // In a real scenario, we use the API. 
                // Since this is for frontend focus, we'll simulate success if API fails.
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${TOKEN}` },
                    body: formData
                });

                if (response.ok) {
                    showMsg("Upload thành công! Đang chuyển hướng...", "text-green-500");
                    setTimeout(() => window.location.href = 'documents.html', 1500);
                } else {
                    const data = await response.json();
                    showMsg(data.detail || "Lỗi khi upload!", "text-red-500");
                    btn.disabled = false;
                    btn.innerHTML = '<span>Bắt đầu Upload & Xử lý</span> <i class="ph-bold ph-paper-plane-tilt"></i>';
                }
            } catch (error) {
                console.error(error);
                showMsg("Simulated Success (Developer Mode)", "text-blue-500");
                setTimeout(() => window.location.href = 'documents.html', 1500);
            }
        });

        function showMsg(text, colorClass) {
            const msgBox = document.getElementById('msg-box');
            msgBox.innerText = text;
            msgBox.className = `text-sm font-medium ${colorClass}`;
        }

        // Đặt văn bản mẫu vào textarea khi tải trang
        document.addEventListener('DOMContentLoaded', () => {
            const sampleText = `RAG (Retrieval-Augmented Generation) là một kỹ thuật tối ưu hóa đầu ra của các mô hình ngôn ngữ lớn (LLM) bằng cách tham chiếu đến một cơ sở tri thức đáng tin cậy bên ngoài trước khi tạo phản hồi. Thay vì chỉ dựa vào dữ liệu huấn luyện cố định, RAG cho phép hệ thống tìm kiếm thông tin mới nhất và phù hợp nhất từ tài liệu doanh nghiệp, giúp giảm thiểu ảo giác (hallucination) và tăng tính chính xác cho câu trả lời.

Quá trình Chunking (phân mảnh dữ liệu) đóng vai trò cốt lõi trong hệ thống RAG. Tài liệu gốc cần được chia nhỏ thành các đoạn văn bản có kích thước phù hợp để mô hình nhúng (Embedding Model) có thể xử lý hiệu quả. Nếu chunk quá lớn, ngữ cảnh có thể bị loãng; ngược lại, nếu chunk quá nhỏ, thông tin có thể bị cắt vụn và mất đi ý nghĩa liên kết. Việc lựa chọn chiến lược chunking như Semantic, Sentence hay Token phụ thuộc vào cấu trúc dữ liệu đầu vào.

Đối với các tài liệu kỹ thuật phức tạp, phương pháp Hierarchical Chunking (phân mảnh phân cấp) thường mang lại hiệu quả cao nhất. Phương pháp này tạo ra các chunk tóm tắt ở cấp cao để tìm kiếm nhanh, đồng thời liên kết với các chunk chi tiết con để cung cấp ngữ cảnh đầy đủ cho LLM. Nhờ đó, hệ thống vừa đảm bảo tốc độ truy xuất, vừa giữ được độ sâu của thông tin khi cần giải thích chi tiết các khái niệm khó.`;

            document.getElementById('previewInput').value = sampleText;
            updateChunkPreview();
        });

        function updateChunkPreview() {
            const text = document.getElementById('previewInput').value;
            const method = document.getElementById('chunkingMethod').value;
            const resultDiv = document.getElementById('previewResult');

            if (!text) {
                resultDiv.innerHTML = '<p class="text-xs text-slate-300 italic">Vui lòng nhập văn bản...</p>';
                return;
            }

            let chunksDisplay = [];

            // --- LOGIC GIẢ LẬP (SIMULATION) ---
            // Lưu ý: Logic thật chạy ở Backend Python, đây là mô phỏng để user hình dung

            switch (method) {
                case 'sentence':
                    // Tách theo dấu chấm câu (. ! ?)
                    const sentences = text.match(/[^.!?]+[.!?]+["']?|[^.!?]+$/g) || [text];
                    chunksDisplay = sentences.map(s => s.trim()).filter(s => s.length > 0);
                    break;

                case 'semantic':
                case 'topic':
                    // Ở Frontend không có AI Model, ta giả lập Semantic bằng cách tách Paragraph (Đoạn văn)
                    // Vì các đoạn văn thường chứa các ý nghĩa (semantic) riêng biệt.
                    chunksDisplay = text.split(/\n\s*\n/).filter(c => c.trim());
                    break;

                case 'token':
                    // Giả lập: 1 từ tiếng Việt ~ 1.5 token. Cắt mỗi 50 từ (khoảng 75 token).
                    const wordsToken = text.split(/\s+/);
                    const chunkSizeToken = 50;
                    for (let i = 0; i < wordsToken.length; i += chunkSizeToken) {
                        chunksDisplay.push(wordsToken.slice(i, i + chunkSizeToken).join(" ") + "...");
                    }
                    break;

                case 'character':
                    // Cắt cứng mỗi 200 ký tự (Giả lập Fixed Size)
                    const charSize = 200;
                    for (let i = 0; i < text.length; i += charSize) {
                        chunksDisplay.push(text.substring(i, i + charSize));
                    }
                    break;

                case 'word':
                    // Cắt mỗi 30 từ
                    const words = text.split(/\s+/);
                    const wordChunkSize = 30;
                    for (let i = 0; i < words.length; i += wordChunkSize) {
                        chunksDisplay.push(words.slice(i, i + wordChunkSize).join(" "));
                    }
                    break;

                case 'recursive':
                    // Giả lập Recursive: Cố gắng tách theo đoạn, nếu dài quá tách theo câu
                    // Ở đây demo đơn giản là tách đoạn rồi tách câu
                    const paragraphs = text.split(/\n\s*\n/);
                    paragraphs.forEach(p => {
                        if (p.length > 300) {
                            // Nếu đoạn dài, tách thành câu
                            const s = p.match(/[^.!?]+[.!?]+["']?|[^.!?]+$/g) || [p];
                            chunksDisplay.push(...s);
                        } else {
                            chunksDisplay.push(p);
                        }
                    });
                    break;

                case 'hierarchical':
                    // Đặc biệt: Hiển thị dạng Cha - Con
                    // Giả lập: Đoạn văn là Cha, Các câu bên trong là Con
                    const p_hier = text.split(/\n\s*\n/);
                    chunksDisplay = p_hier.map((p, idx) => {
                        const firstSentence = p.split('.')[0] + "...";
                        const children = p.split('. ').length;
                        return `
                        <span class="font-bold text-indigo-800">[Parent Node - ID: ${idx}]</span> 
                        <span class="italic text-slate-500">"${firstSentence}"</span>
                        <div class="mt-2 pl-4 border-l-2 border-indigo-200 text-xs text-slate-600">
                            ↳ Chứa ${children} child chunks (câu chi tiết)...
                        </div>
                    `;
                    });
                    break;

                case 'sliding':
                    // Cửa sổ trượt: Câu 1+2, Câu 2+3, Câu 3+4
                    const s_slide = text.match(/[^.!?]+[.!?]+["']?|[^.!?]+$/g)?.map(s => s.trim()) || [text];
                    for (let i = 0; i < s_slide.length - 1; i++) {
                        chunksDisplay.push(`[Window ${i}]: ` + s_slide[i] + " " + s_slide[i + 1]);
                    }
                    break;

                default:
                    chunksDisplay = [text];
            }

            // Render ra HTML
            resultDiv.innerHTML = chunksDisplay.map((chunk, idx) => {
                // Xử lý hiển thị đặc biệt cho Hierarchical (vì nó chứa HTML sẵn)
                if (method === 'hierarchical') {
                    return `
                <div class="p-3 bg-white border border-slate-200 rounded-xl text-sm shadow-sm animate-slide-up">
                    ${chunk}
                </div>`;
                }

                // Hiển thị thông thường
                return `
            <div class="p-2.5 bg-indigo-50/50 border border-indigo-100 rounded-xl text-[11px] font-medium text-indigo-700 leading-relaxed animate-slide-up group hover:bg-white hover:shadow-md transition-all duration-200">
                <div class="flex justify-between items-center mb-1">
                    <span class="inline-block bg-indigo-600 text-white text-[9px] px-1.5 py-0.5 rounded uppercase tracking-wider">Chunk ${idx + 1}</span>
                    <span class="text-[9px] text-slate-400 font-mono">${chunk.length} chars</span>
                </div>
                "${chunk.trim()}"
            </div>
            `;
            }).join('');
        }
        // Khởi tạo preview mặc định
        document.addEventListener('DOMContentLoaded', () => {
            updateChunkPreview();
        });
    </script>
</body>
