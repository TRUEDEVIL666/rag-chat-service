<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Tài liệu - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --secondary: #6366F1;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #f8fafc;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .upload-zone {
            border: 2px dashed #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
            transform: scale(1.01);
        }

        .gradient-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            transition: all 0.3s ease;
        }

        .gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
            filter: brightness(1.1);
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-input {
            transition: all 0.2s ease;
            border-color: #e2e8f0;
        }

        .form-input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden text-slate-700">

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden ml-64 relative bg-[#fbfcfd]">

        <!-- Header -->
        <header
            class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-10 sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <a href="documents.html"
                    class="p-2 hover:bg-slate-50 rounded-full transition text-slate-400 hover:text-primary">
                    <i class="ph ph-arrow-left text-2xl"></i>
                </a>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Upload Tài liệu</h1>
                    <p class="text-sm text-slate-400 font-medium">Bổ sung kiến thức cho hệ thống RAG</p>
                </div>
            </div>
        </header>

        <!-- Form Scroll Area -->
        <div class="flex-1 overflow-auto p-10 flex justify-center">

            <div class="w-full max-w-4xl animate-slide-up">

                <form id="uploadForm" class="grid grid-cols-1 lg:grid-cols-12 gap-10">

                    <!-- LEFT COLUMN: Files & Dropzone -->
                    <div class="lg:col-span-12">
                        <div class="glass-card rounded-3xl p-10 space-y-8">

                            <!-- Section: Selection -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <label
                                        class="block text-sm font-bold text-primary uppercase tracking-widest mb-4">Chọn
                                        Kho Kiến Thức (Knowledge Base)</label>
                                    <div class="relative">
                                        <i
                                            class="ph ph-books absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                        <select id="kbId" required
                                            class="form-input w-full pl-12 pr-10 py-3.5 bg-slate-50/50 rounded-2xl outline-none text-slate-700 appearance-none cursor-pointer">
                                            <option value="">-- Chọn kho tri thức --</option>
                                            <option value="kb_default">Kho Tài Liệu Chung</option>
                                            <option value="kb_cntt">Khoa Công Nghệ Thông Tin</option>
                                            <option value="kb_tuyensinh">Tư Vấn Tuyển Sinh</option>
                                        </select>
                                        <i
                                            class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                                    </div>
                                </div>
                                <div>
                                    <label
                                        class="block text-sm font-bold text-primary uppercase tracking-widest mb-4">Phương
                                        thức Chunking</label>
                                    <div class="relative">
                                        <i
                                            class="ph ph-scissors absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                        <select id="chunkingMethod" onchange="updateChunkPreview()"
                                            class="form-input w-full pl-12 pr-10 py-3.5 bg-slate-50/50 rounded-2xl outline-none text-slate-700 appearance-none cursor-pointer">
                                            <option value="sentence">Tách theo câu (Sentence)</option>
                                            <option value="paragraph">Tách theo đoạn (Paragraph)</option>
                                            <option value="markdown">Theo cấu trúc Markdown</option>
                                            <option value="naive">Naive (Độ dài cố định)</option>
                                        </select>
                                        <i
                                            class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                                    </div>
                                </div>
                            </div>

                            <!-- New Section: Chunking Preview -->
                            <div class="bg-indigo-50/30 rounded-3xl p-8 border border-indigo-100/50 space-y-6">
                                <div class="flex items-center gap-3 mb-2">
                                    <div
                                        class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 shadow-sm">
                                        <i class="ph-bold ph-eye text-xl"></i>
                                    </div>
                                    <div>
                                        <h3 class="text-lg font-bold text-slate-800">Xem trước kết quả Chunking</h3>
                                        <p class="text-xs text-slate-500 font-medium">Thử nghiệm cách hệ thống phân rã
                                            tài liệu của bạn</p>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label
                                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Văn
                                            bản mẫu</label>
                                        <textarea id="previewInput" oninput="updateChunkPreview()" rows="5"
                                            class="w-full p-4 bg-white border border-slate-200 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-100 transition resize-none"
                                            placeholder="Nhập một đoạn văn bản dài để thử nghiệm...">Hệ thống RAG (Retrieval-Augmented Generation) là một phương pháp tiên tiến. Nó giúp chatbot truy xuất thông tin từ tài liệu của bạn.

Đoạn văn thứ hai này sẽ được tách ra nếu bạn chọn chế độ Paragraph. Thử ngay nhé!</textarea>
                                    </div>
                                    <div>
                                        <label
                                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Kết
                                            quả phân mảnh (Chunks)</label>
                                        <div id="previewResult" class="w-full h-[126px] overflow-auto space-y-2 pr-2">
                                            <!-- Chunks will appear here -->
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Section: Upload Zone -->
                            <div>
                                <label class="block text-sm font-bold text-primary uppercase tracking-widest mb-4">Tài
                                    liệu tải lên</label>
                                <div id="dropzone"
                                    class="upload-zone rounded-3xl p-12 flex flex-col items-center justify-center text-center cursor-pointer">
                                    <input type="file" id="fileInput" multiple class="hidden"
                                        accept=".pdf,.docx,.txt,.md,.json">
                                    <div
                                        class="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center text-primary text-4xl mb-6">
                                        <i class="ph ph-cloud-arrow-up"></i>
                                    </div>
                                    <h3 class="text-xl font-bold text-slate-800 mb-2">Kéo thả file vào đây</h3>
                                    <p class="text-slate-400 mb-6">Hỗ trợ PDF, PPTX, DOCX, TXT, Markdown (Tối đa 50MB)
                                    </p>
                                    <button type="button" onclick="document.getElementById('fileInput').click()"
                                        class="bg-white border border-slate-200 px-6 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition shadow-sm">
                                        Chọn từ máy tính
                                    </button>
                                </div>

                                <!-- File Preview List -->
                                <div id="fileList" class="mt-6 space-y-3">
                                    <!-- Files will appear here -->
                                </div>
                            </div>

                            <!-- Action Buttons -->
                            <div class="pt-8 flex items-center justify-between border-t border-slate-50">
                                <p id="msg-box" class="text-sm font-medium"></p>
                                <div class="flex gap-4">
                                    <button type="button" onclick="window.history.back()"
                                        class="px-8 py-3.5 text-slate-500 font-bold hover:bg-slate-50 rounded-2xl transition">Hủy
                                        bỏ</button>
                                    <button type="submit" id="btn-submit"
                                        class="gradient-btn px-10 py-3.5 text-white font-bold rounded-2xl shadow-lg flex items-center gap-2">
                                        <span>Bắt đầu Upload & Xử lý</span>
                                        <i class="ph-bold ph-paper-plane-tilt"></i>
                                    </button>
                                </div>
                            </div>

                        </div>
                    </div>

                </form>

            </div>

        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        const API_URL = "http://localhost:8000/api/v1/upload-file";
        const TOKEN = localStorage.getItem('token');
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        let selectedFiles = [];

        // Handle Drag & Drop
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('dragover'); });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!selectedFiles.find(f => f.name === file.name)) {
                    selectedFiles.push(file);
                    addFileToList(file);
                }
            });
        }

        function addFileToList(file) {
            const div = document.createElement('div');
            div.className = "flex items-center justify-between bg-white border border-slate-100 p-4 rounded-2xl animate-slide-up shadow-sm";
            div.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400">
                        <i class="ph ph-file-text text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-slate-700">${file.name}</p>
                        <p class="text-xs text-slate-400">${(file.size / 1024).toFixed(1)} KB</p>
                    </div>
                </div>
                <button type="button" onclick="removeFile('${file.name}', this)" class="p-2 text-slate-300 hover:text-red-500 transition">
                    <i class="ph ph-trash text-lg"></i>
                </button>
            `;
            fileList.appendChild(div);
        }

        function removeFile(name, btn) {
            selectedFiles = selectedFiles.filter(f => f.name !== name);
            btn.parentElement.remove();
        }

        // Handle Submit
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const msgBox = document.getElementById('msg-box');

            if (selectedFiles.length === 0) {
                showMsg("Vui lòng chọn ít nhất 1 file!", "text-red-500");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> <span>Đang xử lý...</span>';
            msgBox.innerText = "";

            const formData = new FormData();
            formData.append("knowledge_base_id", document.getElementById('kbId').value);
            formData.append("chunking_method", document.getElementById('chunkingMethod').value);
            selectedFiles.forEach(file => {
                formData.append("files", file);
            });

            try {
                // In a real scenario, we use the API. 
                // Since this is for frontend focus, we'll simulate success if API fails.
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${TOKEN}` },
                    body: formData
                });

                if (response.ok) {
                    showMsg("Upload thành công! Đang chuyển hướng...", "text-green-500");
                    setTimeout(() => window.location.href = 'documents.html', 1500);
                } else {
                    const data = await response.json();
                    showMsg(data.detail || "Lỗi khi upload!", "text-red-500");
                    btn.disabled = false;
                    btn.innerHTML = '<span>Bắt đầu Upload & Xử lý</span> <i class="ph-bold ph-paper-plane-tilt"></i>';
                }
            } catch (error) {
                console.error(error);
                showMsg("Simulated Success (Developer Mode)", "text-blue-500");
                setTimeout(() => window.location.href = 'documents.html', 1500);
            }
        });

        function showMsg(text, colorClass) {
            const msgBox = document.getElementById('msg-box');
            msgBox.innerText = text;
            msgBox.className = `text-sm font-medium ${colorClass}`;
        }

        // --- NEW: Chunking Preview Logic ---
        function updateChunkPreview() {
            const text = document.getElementById('previewInput').value;
            const method = document.getElementById('chunkingMethod').value;
            const resultDiv = document.getElementById('previewResult');

            if (!text) {
                resultDiv.innerHTML = '<p class="text-xs text-slate-300 italic">Vui lòng nhập văn bản...</p>';
                return;
            }

            let chunks = [];
            if (method === 'sentence') {
                // Tách theo các dấu chấm, chấm hỏi, chấm than
                chunks = text.split(/(?<=[.!?])\s+/);
            } else if (method === 'paragraph') {
                // Tách theo 2 dấu xuống dòng
                chunks = text.split(/\n\s*\n/);
            } else if (method === 'naive') {
                // Tách mỗi 50 ký tự (giả lập)
                const size = 50;
                for (let i = 0; i < text.length; i += size) {
                    chunks.push(text.substring(i, i + size));
                }
            } else if (method === 'markdown') {
                // Tách theo các dấu # (giả lập)
                chunks = text.split(/(?=^#+ )/m);
            }

            resultDiv.innerHTML = chunks.filter(c => c.trim()).map((chunk, idx) => `
                <div class="p-2.5 bg-indigo-50/50 border border-indigo-100 rounded-xl text-[11px] font-medium text-indigo-700 leading-relaxed animate-slide-up">
                    <span class="inline-block bg-indigo-600 text-white text-[9px] px-1.5 py-0.5 rounded mr-2 mb-1 uppercase">Chunk ${idx + 1}</span>
                    <br>
                    "${chunk.trim()}"
                </div>
            `).join('');
        }

        // Khởi tạo preview mặc định
        document.addEventListener('DOMContentLoaded', () => {
            updateChunkPreview();
        });
    </script>
</body>

</html>
